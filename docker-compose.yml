version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:?PUBLIC_API_URL is required}
    container_name: doflow-frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - INTERNAL_BACKEND_URL=http://backend:4000
      - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - doflow-net

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: doflow-backend
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - ./.env
    environment:
      - PORT=4000
      - DATABASE_URL=postgres://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-doflow}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WS_PATH=/ws
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DB_SYNC=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - doflow-net

  postgres:
    image: postgres:16-alpine
    container_name: doflow-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-doflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-doflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doflow-net

  redis:
    image: redislabs/rebloom:latest
    container_name: doflow-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - doflow-net

  nginx:
    image: nginx:alpine
    container_name: doflow-nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - doflow-net

networks:
  doflow-net:
    driver: bridge

volumes:
  pgdata:
